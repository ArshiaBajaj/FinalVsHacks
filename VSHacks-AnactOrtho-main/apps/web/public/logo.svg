<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Anact Ortho">
  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a41"/>
      <stop offset="100%" stop-color="#ff5b1f"/>
    </linearGradient>
    <filter id="glowG" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowO" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Black rounded tile -->
  <rect width="512" height="512" rx="108" fill="#000000"/>

  <!-- Neon-green court wireframe -->
  <g fill="none" stroke="#39ff14" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowG)">
    <!-- outer court -->
    <rect x="96" y="120" width="320" height="272" rx="8"/>
    <!-- midline -->
    <line x1="256" y1="120" x2="256" y2="392"/>
    <!-- center circle -->
    <circle cx="256" cy="256" r="48"/>
    <!-- left key -->
    <rect x="96" y="188" width="72" height="136"/>
    <path d="M168 220 A36 36 0 0 1 168 292"/>
    <!-- right key -->
    <rect x="344" y="188" width="72" height="136"/>
    <path d="M344 220 A36 36 0 0 0 344 292"/>
  </g>

  <!-- Orange Ortho crosshair / ball mark -->
  <g filter="url(#glowO)">
    <circle cx="256" cy="256" r="22" fill="url(#orangeGrad)"/>
    <circle cx="256" cy="256" r="34" fill="none" stroke="#ff5b1f" stroke-width="6"/>
    <line x1="256" y1="196" x2="256" y2="226" stroke="#ff5b1f" stroke-width="6" stroke-linecap="round"/>
    <line x1="256" y1="286" x2="256" y2="316" stroke="#ff5b1f" stroke-width="6" stroke-linecap="round"/>
    <line x1="196" y1="256" x2="226" y2="256" stroke="#ff5b1f" stroke-width="6" stroke-linecap="round"/>
    <line x1="286" y1="256" x2="316" y2="256" stroke="#ff5b1f" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
